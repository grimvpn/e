<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundForge Web Studio</title>
    
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/timeline.min.js"></script>

    <style>
        :root {
            --bg-dark: #0f1115;
            --bg-panel: #181b22;
            --bg-surface: #222630;
            --border-light: rgba(255, 255, 255, 0.08);
            --accent-blue: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.2);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Верхняя панель */
        header {
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-light);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
            z-index: 10;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span {
            background: var(--accent-blue);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            text-transform: uppercase;
        }

        /* Кнопки */
        .btn {
            background: var(--bg-surface);
            color: var(--text-main);
            border: 1px solid var(--border-light);
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: var(--shadow-sm);
        }

        .btn:hover {
            background: #2d3342;
            border-color: rgba(255,255,255,0.15);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        /* Главный рабочий контейнер */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Левый сайдбар с утилитами */
        aside {
            width: 320px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border-light);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0,0,0,0.15);
        }

        .panel-section {
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 16px;
            box-shadow: var(--shadow-sm);
        }

        .panel-section h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 6px;
        }

        .control-item {
            margin-bottom: 12px;
        }

        .control-item:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 12px;
            margin-bottom: 6px;
            color: #d1d5db;
        }

        /* Кастомные инпуты для объемного вида */
        input[type="number"], select {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            padding: 8px;
            color: white;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus, select:focus {
            border-color: var(--accent-blue);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            background: var(--bg-dark);
            height: 6px;
            border-radius: 3px;
            border: 1px solid var(--border-light);
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--text-main);
            box-shadow: var(--shadow-md);
            cursor: pointer;
            margin-top: -6px;
            border: 1px solid var(--border-light);
        }

        /* Центральная рабочая зона монтажа */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 16px;
            background: var(--bg-dark);
            overflow-y: auto;
        }

        /* Студийный блок волновой формы */
        .timeline-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow-md);
            position: relative;
        }

        #waveform {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03);
        }

        #wave-timeline {
            margin-top: 8px;
            opacity: 0.7;
        }

        .upload-area {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-panel);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            z-index: 5;
        }

        .upload-area p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Информационная панель под треком */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-panel);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 12px 20px;
        }

        .time-counter {
            font-family: monospace;
            font-size: 20px;
            font-weight: bold;
            color: var(--accent-blue);
        }

        .bottom-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }

        .zoom-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 200px;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">SoundForge <span>Pro</span></div>
        <div>
            <button class="btn" onclick="document.getElementById('audioFile').click()">Открыть файл</button>
            <button class="btn btn-primary" id="exportBtn" disabled>Сохранить результат</button>
            <input type="file" id="audioFile" accept="audio/*,video/mp4" style="display: none;">
        </div>
    </header>

    <div class="main-container">
        <aside>
            <div class="panel-section">
                <h3>Точная обрезка (сек)</h3>
                <div class="control-item">
                    <label>Начало фрагмента</label>
                    <input type="number" id="inputStart" value="0" min="0" step="0.01">
                </div>
                <div class="control-item">
                    <label>Конец фрагмента</label>
                    <input type="number" id="inputEnd" value="0" min="0" step="0.01">
                </div>
            </div>

            <div class="panel-section">
                <h3>Эффекты переходов</h3>
                <div class="control-item">
                    <label>Fade-In (Плавное начало, сек)</label>
                    <input type="number" id="fadeInDuration" value="0" min="0" max="10" step="0.5">
                </div>
                <div class="control-item">
                    <label>Fade-Out (Плавное затухание, сек)</label>
                    <input type="number" id="fadeOutDuration" value="0" min="0" max="10" step="0.5">
                </div>
            </div>

            <div class="panel-section">
                <h3>Мастер-шина</h3>
                <div class="control-item">
                    <label>Скорость трека (Speed)</label>
                    <input type="range" id="speedSlider" min="0.5" max="2" step="0.05" value="1">
                    <div id="speedVal" style="font-size: 11px; text-align: right; color: var(--text-muted);">1.0x</div>
                </div>
                <div class="control-item">
                    <label>Громкость превью</label>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.7">
                </div>
            </div>
        </aside>

        <main class="workspace">
            <div class="timeline-card">
                <div class="upload-area" id="uploadArea">
                    <button class="btn btn-primary" onclick="document.getElementById('audioFile').click()">Выбрать аудио или MP4 видео</button>
                    <p>Интерактивный монтаж станет доступен после импорта</p>
                </div>
                
                <div id="waveform"></div>
                <div id="wave-timeline"></div>
            </div>

            <div class="status-bar">
                <div class="time-counter" id="timeDisplay">00:00.00</div>
                
                <div class="bottom-controls">
                    <button class="btn" id="btnPlay" disabled>Play</button>
                    <button class="btn" id="btnLoop" disabled>Петля (Loop): Выкл</button>
                </div>

                <div class="zoom-container">
                    <span>Zoom:</span>
                    <input type="range" id="zoomSlider" min="10" max="200" value="50" disabled>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Глобальные переменные
        let wavesurfer, wsRegions, activeRegion;
        let originalAudioBuffer = null;
        let isLooping = false;

        // Элементы интерфейса
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('audioFile');
        const timeDisplay = document.getElementById('timeDisplay');
        const btnPlay = document.getElementById('btnPlay');
        const btnLoop = document.getElementById('btnLoop');
        const btnExport = document.getElementById('exportBtn');
        const zoomSlider = document.getElementById('zoomSlider');
        const speedSlider = document.getElementById('speedSlider');
        const volumeSlider = document.getElementById('volumeSlider');
        const inputStart = document.getElementById('inputStart');
        const inputEnd = document.getElementById('inputEnd');

        // Инициализация движка студии
        function initStudio() {
            wavesurfer = WaveSurfer.create({
                container: '#waveform',
                waveColor: '#4b5563',
                progressColor: '#3b82f6',
                cursorColor: '#ef4444',
                cursorWidth: 2,
                height: 160,
                barWidth: 2,
                barGap: 2,
                normalize: true,
                plugins: [
                    WaveSurfer.Timeline.create({ container: '#wave-timeline' })
                ]
            });

            // Подключаем плагин интерактивных зон (обрезки)
            wsRegions = wavesurfer.registerPlugin(WaveSurfer.Regions.create());

            // События плеера
            wavesurfer.on('timeupdate', (currentTime) => {
                let mins = Math.floor(currentTime / 60);
                let secs = Math.floor(currentTime % 60);
                let ms = Math.floor((currentTime % 1) * 100);
                timeDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}.${ms.toString().padStart(2, '0')}`;
                
                // Проверка петли (Loop) внутри выбранного региона
                if (isLooping && activeRegion && currentTime >= activeRegion.end) {
                    wavesurfer.seekTo((activeRegion.start / wavesurfer.getDuration()));
                }
            });

            // Логика работы с ползунками обрезки
            wsRegions.on('region-updated', (region) => {
                activeRegion = region;
                inputStart.value = region.start.toFixed(2);
                inputEnd.value = region.end.toFixed(2);
            });

            wavesurfer.on('interaction', () => {
                if(activeRegion) {
                    // Если кликнули мимо региона, возвращаем курсор в начало региона при проигрывании
                    const cur = wavesurfer.getCurrentTime();
                    if(cur < activeRegion.start || cur > activeRegion.end) {
                        wavesurfer.setTime(activeRegion.start);
                    }
                }
            });
        }

        // Загрузка файла
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            if (!wavesurfer) initStudio();

            uploadArea.style.display = 'none';
            
            // Читаем файл как ArrayBuffer для сохранения оригинального качества
            const reader = new FileReader();
            reader.onload = function(evt) {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                ctx.decodeAudioData(evt.target.result, function(buffer) {
                    originalAudioBuffer = buffer;
                    // Передаем файл в визуализатор
                    wavesurfer.loadBlob(file);
                });
            };
            reader.readAsArrayBuffer(file);
        });

        // Когда аудио отрендерилось на таймлайне
        wavesurfer?.on('ready', () => {
            const duration = wavesurfer.getDuration();
            
            // Настраиваем числовые инпуты
            inputStart.max = duration;
            inputEnd.max = duration;
            inputStart.value = 0;
            inputEnd.value = duration.toFixed(2);

            // Создаем визуальную зону обрезки (по умолчанию занимает 80% трека)
            wsRegions.clearRegions();
            activeRegion = wsRegions.addRegion({
                start: 0,
                end: duration * 0.8,
                color: 'rgba(59, 130, 246, 0.25)',
                drag: true,
                resize: true
            });

            // Активируем элементы управления
            btnPlay.disabled = false;
            btnLoop.disabled = false;
            btnExport.disabled = false;
            zoomSlider.disabled = false;
            wavesurfer.setVolume(volumeSlider.value);
        });

        // Управление воспроизведением
        btnPlay.addEventListener('click', () => {
            if (wavesurfer.isPlaying()) {
                wavesurfer.pause();
                btnPlay.innerText = "Play";
            } else {
                // Стартуем с начала выделенной области, если курсор вне её
                const cur = wavesurfer.getCurrentTime();
                if(activeRegion && (cur < activeRegion.start || cur > activeRegion.end)) {
                    wavesurfer.setTime(activeRegion.start);
                }
                wavesurfer.play();
                btnPlay.innerText = "Pause";
            }
        });

        btnLoop.addEventListener('click', () => {
            isLooping = !isLooping;
            btnLoop.innerText = isLooping ? "Петля (Loop): Вкл" : "Петля (Loop): Выкл";
            btnLoop.style.borderColor = isLooping ? "var(--accent-blue)" : "var(--border-light)";
        });

        // Изменение инпутов руками меняет границы на графике
        inputStart.addEventListener('change', () => {
            if(activeRegion) activeRegion.setOptions({ start: parseFloat(inputStart.value) });
        });
        inputEnd.addEventListener('change', () => {
            if(activeRegion) activeRegion.setOptions({ end: parseFloat(inputEnd.value) });
        });

        // Зум, Скорость и Громкость
        zoomSlider.addEventListener('input', (e) => {
            wavesurfer.zoom(Number(e.target.value));
        });
        speedSlider.addEventListener('input', (e) => {
            wavesurfer.setPlaybackRate(Number(e.target.value));
            document.getElementById('speedVal').innerText = e.target.value + "x";
        });
        volumeSlider.addEventListener('input', (e) => {
            wavesurfer.setVolume(Number(e.target.value));
        });


        // === МОЩНЫЙ ДВИЖОК СЛИЯНИЯ И ЭКСПОРТА (WAV) ===
        btnExport.addEventListener('click', () => {
            if (!originalAudioBuffer || !activeRegion) return;

            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const sampleRate = originalAudioBuffer.sampleRate;
            
            const startSec = activeRegion.start;
            const endSec = activeRegion.end;
            const durationSec = endSec - startSec;
            
            const startSample = Math.floor(startSec * sampleRate);
            const numSamples = Math.floor(durationSec * sampleRate);

            // Создаем новый пустой аудио-буфер под обрезанный кусок
            const croppedBuffer = ctx.createBuffer(
                originalAudioBuffer.numberOfChannels,
                numSamples,
                sampleRate
            );

            // Параметры Fade эффектов
            const fadeInSec = parseFloat(document.getElementById('fadeInDuration').value) || 0;
            const fadeOutSec = parseFloat(document.getElementById('fadeOutDuration').value) || 0;
            const fadeInSamples = Math.floor(fadeInSec * sampleRate);
            const fadeOutSamples = Math.floor(fadeOutSec * sampleRate);

            // Копируем данные каналов и применяем эффекты
            for (let channel = 0; channel < originalAudioBuffer.numberOfChannels; channel++) {
                const origData = originalAudioBuffer.getChannelData(channel);
                const newData = croppedBuffer.getChannelData(channel);

                for (let i = 0; i < numSamples; i++) {
                    let sampleIndex = startSample + i;
                    // Защита от выхода за границы оригинального файла
                    if (sampleIndex >= origData.length) break; 
                    
                    let sample = origData[sampleIndex];

                    // Эффект Плавного появления (Fade-In)
                    if (i < fadeInSamples && fadeInSamples > 0) {
                        let gain = i / fadeInSamples;
                        sample *= gain;
                    }
                    // Эффект Плавного затухания (Fade-Out)
                    if (i > (numSamples - fadeOutSamples) && fadeOutSamples > 0) {
                        let samplesFromEnd = numSamples - i;
                        let gain = samplesFromEnd / fadeOutSamples;
                        sample *= gain;
                    }

                    newData[i] = sample;
                }
            }

            // Конвертируем обработанный буфер в скачиваемый WAV файл
            const wavBytes = bufferToWav(croppedBuffer);
            const blob = new Blob([wavBytes], { type: 'audio/wav' });
            const blobUrl = URL.createObjectURL(blob);

            const downloadLink = document.createElement('a');
            downloadLink.href = blobUrl;
            downloadLink.download = 'edited_studio_track.wav';
            document.body.appendChild(downloadLink);
            downloadLink.click();
            
            // Очистка памяти
            document.body.removeChild(downloadLink);
            URL.revokeObjectURL(blobUrl);
        });

        // Низкоуровневый бинарный конвертер PCM данных в WAV-контейнер
        function bufferToWav(buffer) {
            const numOfChan = buffer.numberOfChannels;
            const sampleRate = buffer.sampleRate;
            const format = 1; // Uncompressed PCM
            const bitDepth = 16;
            
            let result;
            if (numOfChan === 2) {
                result = interleave(buffer.getChannelData(0), buffer.getChannelData(1));
            } else {
                result = buffer.getChannelData(0);
            }
            
            const bufferArray = new ArrayBuffer(44 + result.length * 2);
            const view = new DataView(bufferArray);
            
            // RIFF идентификатор
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + result.length * 2, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, format, true);
            view.setUint16(22, numOfChan, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * numOfChan * (bitDepth / 8), true);
            view.setUint16(32, numOfChan * (bitDepth / 8), true);
            view.setUint16(34, bitDepth, true);
            writeString(view, 36, 'data');
            view.setUint32(40, result.length * 2, true);
            
            // Запись звуковых сэмплов с ограничением амплитуды
            let index = 44;
            for (let i = 0; i < result.length; i++) {
                let sample = Math.max(-1, Math.min(1, result[i]));
                sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                view.setInt16(index, sample, true);
                index += 2;
            }
            
            return bufferArray;
        }

        function interleave(inputL, inputR) {
            const length = inputL.length + inputR.length;
            const result = new Float32Array(length);
            let index = 0;
            let inputIndex = 0;
            while (index < length) {
                result[index++] = inputL[inputIndex];
                result[index++] = inputR[inputIndex];
                inputIndex++;
            }
            return result;
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }
    </script>
</body>
</html>
