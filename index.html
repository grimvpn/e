<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioCore | Premium Editor</title>
    <style>
        /* === СТРОГИЙ ПРЕМИУМ ДИЗАЙН === */
        :root {
            --bg-main: #0a0a0a;
            --bg-panel: #141414;
            --border-color: #2a2a2a;
            --accent: #00ff66; /* Четкий технический акцент */
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-family);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Хедер */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        h1 span { color: var(--accent); }

        .btn {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-main);
            border-color: var(--accent);
            font-weight: bold;
        }

        .btn-primary:hover {
            background: transparent;
            color: var(--accent);
        }

        /* Основная рабочая область */
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Боковая панель инструментов */
        aside {
            width: 300px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            background: var(--accent);
            cursor: pointer;
            margin-top: -6px;
            border-radius: 0; /* Строгий квадратный стиль */
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            cursor: pointer;
            background: var(--border-color);
        }

        input[type="number"] {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px;
            font-size: 12px;
            width: 100%;
            outline: none;
        }

        input[type="number"]:focus { border-color: var(--accent); }

        /* Область осциллограммы */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }

        .canvas-container {
            flex: 1;
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            position: relative;
            margin-bottom: 20px;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .file-upload-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        input[type="file"] { display: none; }

        .time-display {
            font-family: monospace;
            font-size: 24px;
            color: var(--accent);
            text-align: center;
            margin-bottom: 10px;
        }

        .transport-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Audio<span>Core</span></h1>
            <div class="header-actions">
                <button class="btn" onclick="document.getElementById('fileInput').click()">Загрузить файл</button>
                <button class="btn btn-primary" id="exportBtn" disabled>Экспорт WAV</button>
            </div>
        </header>

        <main>
            <aside class="toolbar">
                <div class="control-group">
                    <label>Скорость воспроизведения (Speed/Pitch)</label>
                    <input type="range" id="speedSlider" min="0.5" max="2" step="0.01" value="1">
                    <span id="speedValue" style="font-size: 12px;">1.00x</span>
                </div>
                
                <div class="control-group">
                    <label>Громкость (Gain)</label>
                    <input type="range" id="volumeSlider" min="0" max="2" step="0.01" value="1">
                </div>

                <div class="control-group">
                    <label>Начало обрезки (Сек)</label>
                    <input type="number" id="trimStart" value="0" min="0" step="0.1">
                </div>

                <div class="control-group">
                    <label>Конец обрезки (Сек)</label>
                    <input type="number" id="trimEnd" value="0" min="0" step="0.1">
                </div>
            </aside>

            <section class="workspace">
                <div class="time-display" id="timeDisplay">00:00.000</div>
                <div class="canvas-container">
                    <div class="file-upload-wrapper" id="uploadPrompt">
                        <label for="fileInput" class="btn">Выберите аудио или видео (MP4)</label>
                        <input type="file" id="fileInput" accept="audio/*,video/mp4">
                    </div>
                    <canvas id="waveform"></canvas>
                </div>

                <div class="transport-controls">
                    <button class="btn" id="playBtn" disabled>Play</button>
                    <button class="btn" id="stopBtn" disabled>Stop</button>
                </div>
            </section>
        </main>
    </div>

    <script>
        // === ИНИЦИАЛИЗАЦИЯ И ПЕРЕМЕННЫЕ ===
        let audioCtx;
        let audioBuffer;
        let sourceNode;
        let gainNode;
        let isPlaying = false;
        let startTime = 0;
        let pausedAt = 0;
        let animationFrame;

        const fileInput = document.getElementById('fileInput');
        const canvas = document.getElementById('waveform');
        const canvasCtx = canvas.getContext('2d');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const exportBtn = document.getElementById('exportBtn');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const timeDisplay = document.getElementById('timeDisplay');
        const speedSlider = document.getElementById('speedSlider');
        const trimStart = document.getElementById('trimStart');
        const trimEnd = document.getElementById('trimEnd');

        // Подгоняем размер канваса под контейнер
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            if (audioBuffer) drawWaveform(audioBuffer);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // === ОБРАБОТКА ФАЙЛА ===
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            uploadPrompt.style.display = 'none';
            timeDisplay.innerText = "Чтение файла...";

            const reader = new FileReader();
            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                timeDisplay.innerText = "Декодирование аудио...";
                
                audioCtx.decodeAudioData(arrayBuffer, function(buffer) {
                    audioBuffer = buffer;
                    trimEnd.value = buffer.duration.toFixed(2);
                    trimEnd.max = buffer.duration;
                    trimStart.max = buffer.duration;
                    
                    drawWaveform(buffer);
                    timeDisplay.innerText = "00:00.000";
                    
                    playBtn.disabled = false;
                    stopBtn.disabled = false;
                    exportBtn.disabled = false;
                }, function(e) {
                    alert("Ошибка декодирования файла. Убедитесь, что формат поддерживается.");
                });
            };
            reader.readAsArrayBuffer(file);
        });

        // === ОТРИСОВКА ОСЦИЛЛОГРАММЫ (WAVEFORM) ===
        function drawWaveform(buffer) {
            const width = canvas.width;
            const height = canvas.height;
            const data = buffer.getChannelData(0);
            const step = Math.ceil(data.length / width);
            const amp = height / 2;

            canvasCtx.fillStyle = '#0a0a0a';
            canvasCtx.fillRect(0, 0, width, height);
            canvasCtx.fillStyle = '#00ff66';

            for (let i = 0; i < width; i++) {
                let min = 1.0;
                let max = -1.0;
                for (let j = 0; j < step; j++) {
                    const datum = data[(i * step) + j]; 
                    if (datum < min) min = datum;
                    if (datum > max) max = datum;
                }
                canvasCtx.fillRect(i, (1 + min) * amp, 1, Math.max(1, (max - min) * amp));
            }
        }

        // === ВОСПРОИЗВЕДЕНИЕ ===
        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audioCtx.suspend();
                isPlaying = false;
                playBtn.innerText = "Play";
                cancelAnimationFrame(animationFrame);
            } else {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                } else {
                    playAudio();
                }
                isPlaying = true;
                playBtn.innerText = "Pause";
                updateTime();
            }
        });

        stopBtn.addEventListener('click', stopAudio);

        function playAudio() {
            if (sourceNode) sourceNode.disconnect();
            
            sourceNode = audioCtx.createBufferSource();
            sourceNode.buffer = audioBuffer;
            
            gainNode = audioCtx.createGain();
            gainNode.gain.value = document.getElementById('volumeSlider').value;
            
            sourceNode.playbackRate.value = speedSlider.value;

            sourceNode.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            let startOffset = parseFloat(trimStart.value) || 0;
            let duration = (parseFloat(trimEnd.value) || audioBuffer.duration) - startOffset;

            sourceNode.start(0, startOffset + pausedAt, duration - pausedAt);
            startTime = audioCtx.currentTime - pausedAt;

            sourceNode.onended = () => {
                if(isPlaying) stopAudio();
            };
        }

        function stopAudio() {
            if (sourceNode) {
                sourceNode.stop();
                sourceNode.disconnect();
            }
            isPlaying = false;
            pausedAt = 0;
            playBtn.innerText = "Play";
            timeDisplay.innerText = "00:00.000";
            cancelAnimationFrame(animationFrame);
        }

        function updateTime() {
            if (isPlaying) {
                let currentPlayTime = audioCtx.currentTime - startTime + parseFloat(trimStart.value);
                let totalSeconds = currentPlayTime * parseFloat(speedSlider.value);
                
                let mins = Math.floor(totalSeconds / 60);
                let secs = Math.floor(totalSeconds % 60);
                let ms = Math.floor((totalSeconds % 1) * 1000);
                
                timeDisplay.innerText = 
                    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}.${ms.toString().padStart(3, '0')}`;
                
                animationFrame = requestAnimationFrame(updateTime);
            }
        }

        // === УПРАВЛЕНИЕ ===
        speedSlider.addEventListener('input', (e) => {
            document.getElementById('speedValue').innerText = e.target.value + "x";
            if (sourceNode) sourceNode.playbackRate.value = e.target.value;
        });

        document.getElementById('volumeSlider').addEventListener('input', (e) => {
            if (gainNode) gainNode.gain.value = e.target.value;
        });

        // === ЭКСПОРТ (ОБРЕЗКА + СОХРАНЕНИЕ В WAV) ===
        exportBtn.addEventListener('click', () => {
            if (!audioBuffer) return;
            
            const startSec = parseFloat(trimStart.value);
            const endSec = parseFloat(trimEnd.value);
            const rate = parseFloat(speedSlider.value);
            
            // Вычисляем новые параметры буфера
            const startSample = Math.floor(startSec * audioBuffer.sampleRate);
            const endSample = Math.floor(endSec * audioBuffer.sampleRate);
            const frameCount = endSample - startSample;
            
            // Создаем новый буфер (упрощенно: без пересчета скорости для экспорта, только обрезка)
            // Для применения скорости в экспорте требуется OfflineAudioContext
            const newBuffer = audioCtx.createBuffer(
                audioBuffer.numberOfChannels, 
                frameCount, 
                audioBuffer.sampleRate
            );

            for (let channel = 0; channel < audioBuffer.numberOfChannels; channel++) {
                const channelData = audioBuffer.getChannelData(channel);
                const newChannelData = newBuffer.getChannelData(channel);
                for (let i = 0; i < frameCount; i++) {
                    newChannelData[i] = channelData[startSample + i];
                }
            }

            const wavData = audioBufferToWav(newBuffer);
            const blob = new Blob([wavData], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = 'AudioCore_Export.wav';
            document.body.appendChild(a);
            a.click();
            URL.revokeObjectURL(url);
        });

        // Функция кодирования AudioBuffer в формат WAV
        function audioBufferToWav(buffer) {
            const numOfChan = buffer.numberOfChannels,
                  length = buffer.length * numOfChan * 2 + 44,
                  bufferArray = new ArrayBuffer(length),
                  view = new DataView(bufferArray),
                  channels = [],
                  sampleRate = buffer.sampleRate;
            let offset = 0, pos = 0;

            function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
            function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }

            // WAV Header
            setUint32(0x46464952); // "RIFF"
            setUint32(length - 8); // file length - 8
            setUint32(0x45564157); // "WAVE"
            setUint32(0x20746d66); // "fmt " chunk
            setUint32(16);         // length = 16
            setUint16(1);          // PCM (uncompressed)
            setUint16(numOfChan);
            setUint32(sampleRate);
            setUint32(sampleRate * 2 * numOfChan); // avg. bytes/sec
            setUint16(numOfChan * 2); // block-align
            setUint16(16);         // 16-bit (hardcoded)
            setUint32(0x61746164); // "data" - chunk
            setUint32(length - pos - 4); // chunk length

            // Запись PCM данных
            for (let i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));

            while (offset < buffer.length) {
                for (let i = 0; i < numOfChan; i++) {
                    let sample = Math.max(-1, Math.min(1, channels[i][offset]));
                    sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0;
                    view.setInt16(pos, sample, true);
                    pos += 2;
                }
                offset++;
            }
            return bufferArray;
        }
    </script>
</body>
</html>
